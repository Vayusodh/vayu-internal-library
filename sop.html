<!DOCTYPE html>
<html>
<head>
<title>VAYU SOP Dashboard</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Segoe UI;
background:#0b1220;
color:white;
}

/* NAVBAR */
.navbar{
position:fixed;
top:0;
width:100%;
padding:15px 40px;
display:flex;
justify-content:space-between;
align-items:center;
background:linear-gradient(90deg,#0f172a,#1e3a8a,#0ea5e9);
}

.nav-logo{width:110px;}

.back-btn{
background:#38bdf8;
padding:8px 15px;
border-radius:5px;
cursor:pointer;
color:black;
font-weight:bold;
}

/* TITLE */
.page-title{
margin-top:120px;
text-align:center;
font-size:32px;
color:#38bdf8;
}

/* SEARCH */
.search-box{
text-align:center;
margin:30px 0;
}

.search-box input{
padding:10px;
width:300px;
border-radius:6px;
border:none;
}

/* SOP GRID */
.sop-container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
padding:40px;
}

.sop-card{
background:#1e293b;
padding:30px;
border-radius:15px;
text-align:center;
cursor:pointer;
transition:0.3s;
}

.sop-card:hover{
background:#38bdf8;
color:black;
transform:scale(1.05);
}

/* PDF VIEWER */
#pdfViewer{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
}

#pdfViewer iframe{
width:80%;
height:80%;
}

.close-btn{
position:absolute;
top:20px;
right:40px;
font-size:20px;
cursor:pointer;
color:white;
}
</style>
</head>

<body>

<div class="navbar">
<img src="logo.png" class="nav-logo">
<div class="back-btn" onclick="goHome()">⬅ Back</div>
</div>

<div class="page-title">
Standard Operating Procedures
</div>

<div class="search-box">
<input type="text" id="searchInput" placeholder="Search SOP..." onkeyup="searchSOP()">
</div>

<div class="sop-container" id="sopContainer">

<div class="sop-card" onclick="openPDF('sop1.pdf')">
Gas Handling SOP
</div>

<div class="sop-card" onclick="openPDF('sop2.pdf')">
Cleanroom Protocol SOP
</div>

<div class="sop-card" onclick="openPDF('sop3.pdf')">
Chemical Safety SOP
</div>

</div>

<!-- PDF VIEWER -->
<div id="pdfViewer">
<div class="close-btn" onclick="closePDF()">✖ Close</div>
<iframe id="pdfFrame"></iframe>
</div>

<script>
function goHome(){
window.location.href="index.html";
}

function openPDF(file){
document.getElementById("pdfViewer").style.display="flex";
document.getElementById("pdfFrame").src=file;
}

function closePDF(){
document.getElementById("pdfViewer").style.display="none";
document.getElementById("pdfFrame").src="";
}

function searchSOP(){
let input=document.getElementById("searchInput").value.toLowerCase();
let cards=document.getElementsByClassName("sop-card");

for(let i=0;i<cards.length;i++){
let text=cards[i].innerText.toLowerCase();
cards[i].style.display=text.includes(input) ? "block" : "none";
}
}
</script>

</body>
</html>
