<!DOCTYPE html>
<html>
<head>
<title>VAYU Internal Library</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#0f172a;
    color:white;
}

/* LOGIN SCREEN */
.lock-container{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e293b);
}

.logo{
    width:120px;
    margin-bottom:20px;
}

input{
    padding:12px;
    border-radius:6px;
    border:none;
    margin-top:10px;
}

button{
    padding:12px 25px;
    margin-top:15px;
    border:none;
    border-radius:6px;
    background:#2563eb;
    color:white;
    cursor:pointer;
}

/* MAIN CONTENT */
.main-content{
    display:none;
    background:#f8fafc;
    color:#111;
    padding:40px;
}

section{
    margin-bottom:40px;
}
</style>
</head>

<body>

<!-- LOGIN PAGE -->
<div class="lock-container" id="loginBox">
    <img src="logo.png" class="logo">
    <h2>VAYU Internal Library</h2>
    <input type="password" id="password" placeholder="Enter Password">
    <button onclick="checkPassword()">Unlock</button>
</div>

<!-- MAIN WEBSITE -->
<div class="main-content" id="mainContent">

    <section style="text-align:center;">
        <h1>Welcome to VAYU Internal Library</h1>
        <p>Centralized Document Control & Knowledge Hub</p>
    </section>

    <section>
        <h2>About</h2>
        <p>Structured platform for managing SOPs and Policies securely.</p>
    </section>

    <section>
        <h2>Vision</h2>
        <p>Build centralized digital knowledge ecosystem.</p>
    </section>

    <section>
        <h2>Mission</h2>
        <p>Ensure secure and organized documentation system.</p>
    </section>

    <section style="text-align:center;">
        <button>SOP</button>
        <button>Policy</button>
        <button>Forms</button>
    </section>

</div>

<script>
function checkPassword(){
    var pass=document.getElementById("password").value;
    if(pass==="Vayu"){
        document.getElementById("loginBox").style.display="none";
        document.getElementById("mainContent").style.display="block";
    }else{
        alert("Wrong Password");
    }
}
</script>

</body>
</html>
