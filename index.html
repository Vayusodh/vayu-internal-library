<!DOCTYPE html>
<html>
<head>
<title>VAYU Internal Library</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#0f172a,#1e293b);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}

.lock-container{
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    padding:40px;
    border-radius:20px;
    text-align:center;
    width:350px;
    box-shadow:0 0 40px rgba(0,0,0,0.6);
}

.logo{
    width:120px;
    margin-bottom:20px;
}

h2{
    margin-bottom:20px;
    font-weight:500;
}

input{
    width:100%;
    padding:12px;
    border-radius:8px;
    border:none;
    margin-top:10px;
    outline:none;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:white;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#1d4ed8;
}

.main-content{
    display:none;
    padding:40px;
}
</style>
</head>

<body>

<div class="lock-container" id="loginBox">

    <!-- 🔥 CHANGE THIS IMAGE FILE NAME AFTER UPLOAD -->
    <img src="logo.png" class="logo">

    <h2>VAYU Internal Library</h2>
    <p>Secure Access Portal</p>

    <input type="password" id="password" placeholder="Enter Password">
    <button onclick="checkPassword()">Unlock</button>

</div>

<div class="main-content" id="mainContent">
    <h1>Welcome to VAYU Internal Library</h1>
    <p>Internal Knowledge Hub Loaded Successfully.</p>
</div>

<script>
function checkPassword(){
    var pass = document.getElementById("password").value;
    if(pass === "Vayu"){
        document.getElementById("loginBox").style.display="none";
        document.getElementById("mainContent").style.display="block";
    }
    else{
        alert("Access Denied");
    }
}
</script>

</body>
</html>
