<!DOCTYPE html>
<html>
<head>
<title>VAYU Internal Library</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
}

/* LOGIN SCREEN */
.lock-container{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    color:white;
}

.logo{
    width:120px;
    margin-bottom:20px;
}

input{
    padding:12px;
    border-radius:6px;
    border:none;
    margin-top:10px;
    width:220px;
}

button{
    padding:12px 25px;
    margin-top:15px;
    border:none;
    border-radius:6px;
    background:#2563eb;
    color:white;
    cursor:pointer;
}

#errorMsg{
    margin-top:12px;
    font-size:14px;
    display:none;
    background:rgba(255,0,0,0.1);
    padding:8px 12px;
    border-radius:6px;
    color:#ff4d4d;
}

/* LOADER */
.loader{
   .loader{
    display:none;   /* ⚠ THIS MUST BE HERE */
    position:fixed;
    width:100%;
    height:100vh;
    background:#0f172a;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.spinner{
    width:70px;
    height:70px;
    border:8px solid #1e293b;
    border-top:8px solid #ff3b3b;
    border-radius:50%;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    0%{ transform:rotate(0deg); }
    100%{ transform:rotate(360deg); }
}

/* MAIN WEBSITE */
.main-content{
    display:none;
}

/* TOP BAR */
.topbar{
    background:#1e293b;
    color:white;
    padding:8px 20px;
    display:flex;
    justify-content:space-between;
    font-size:14px;
}

/* NAVBAR */
.navbar{
    position:fixed;
    top:0;
    width:100%;
    padding:15px 50px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:rgba(15,23,42,0.85);
    z-index:1000;
}

.nav-logo{
    width:100px;
}

.nav-links a{
    color:white;
    margin-left:20px;
    text-decoration:none;
    font-weight:bold;
    position:relative;
    transition:0.3s;
}

.nav-links a:hover{
    color:#ff3b3b;
}

.nav-links a::after{
    content:"";
    position:absolute;
    width:0%;
    height:2px;
    left:0;
    bottom:-5px;
    background:#ff3b3b;
    transition:0.3s;
}

.nav-links a:hover::after{
    width:100%;
}
.logout-btn{
    color:#ff3b3b !important;
}
/* HERO SECTION */
.hero-section{
    height:100vh;
    padding-top:80px;
    background:linear-gradient(rgba(0,0,0,0.3),rgba(0,0,0,0.3)), url('hero.jpg') center/cover no-repeat;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:white;
}

.hero-overlay h1{
    font-size:50px;
    margin:0;
}

.hero-overlay h2{
    color:#ff3b3b;
    margin:10px 0;
}

.hero-overlay p{
    margin-top:10px;
    font-size:18px;
}
</style>
</head>

<body>

<!-- LOGIN PAGE -->
<div class="lock-container" id="loginBox">
    <img src="logo.png" class="logo">
    <h2>VAYU Internal Library</h2>
    <p style="opacity:0.8;">Secure Access Portal</p>
    <input type="password" id="password" placeholder="Enter Password">
    <button onclick="checkPassword()">Unlock</button>
    <p id="errorMsg"></p>
</div>

<!-- LOADER -->
<div id="loader" class="loader">
    <div class="spinner"></div>
</div>

<!-- MAIN WEBSITE -->
<div class="main-content" id="mainContent">

    <div class="topbar">
        <span>📞 +91 XXXXX XXXXX</span>
        <span>✉ library@vayu.com</span>
    </div>

    <div class="navbar">
        <img src="logo.png" class="nav-logo">
        <div class="nav-links">
            <a href="#">Home</a>
            <a href="sop.html">SOP</a>
            <a href="#">Policy</a>
            <a href="#">Forms</a>
            <a onclick="logout()" class="logout-btn">Logout</a>
        </div>
    </div>

    <section class="hero-section">
        <div class="hero-overlay">
            <h1>VAYU INTERNAL LIBRARY</h1>
            <h2>Emerging Technologies</h2>
            <p>Centralized Document Control & Secure Knowledge Hub</p>
            <button onclick="location.href='sop.html'">Enter Library</button>
        </div>
    </section>

</div>

<script>
window.onload = function(){
    if(sessionStorage.getItem("accessGranted") === "yes"){
        document.getElementById("loginBox").style.display="none";
        document.getElementById("mainContent").style.display="block";
    }
}

function checkPassword(){
    var pass=document.getElementById("password").value;
    var error=document.getElementById("errorMsg");

    if(pass==="Vayu"){
        sessionStorage.setItem("accessGranted","yes");
        document.getElementById("loginBox").style.display="none";
        document.getElementById("loader").style.display="flex";

        setTimeout(function(){
            document.getElementById("loader").style.display="none";
            document.getElementById("mainContent").style.display="block";
        },1500);

    }else{
        error.style.display="block";
        error.innerHTML="Access Denied. Please contact VAYU Team for authorized access.";
    }
}

function logout(){
    sessionStorage.removeItem("accessGranted");
    document.getElementById("mainContent").style.display="none";
    document.getElementById("loginBox").style.display="flex";
}
</script>

</body>
</html>
